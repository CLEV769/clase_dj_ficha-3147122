{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-md-6">
    <div class="card-dark">
      <div class="card-header text-center" style="background:var(--bg-surface); border-bottom:1px solid var(--border-subtle); border-radius:12px 12px 0 0; padding:1.2rem;">
        <h2 style="margin:0; font-size:1.3rem;">✏️ Actualizar Registro</h2>
      </div>
      <div class="card-body" style="padding:2rem;">
        <form method="POST" novalidate>
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3 field-wrapper">
              {{ field }}
              {% if field.help_text %}
                <small class="form-text" style="color:var(--text-secondary); font-size:0.75rem;">{{ field.help_text|safe }}</small>
              {% endif %}
              {% for error in field.errors %}
                <div class="invalid-feedback d-block">{{ error }}</div>
              {% endfor %}
            </div>
          {% endfor %}
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-warning-custom">Actualizar</button>
            <a href="{% url 'home' %}" class="btn btn-outline-subtle" data-spa>Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
