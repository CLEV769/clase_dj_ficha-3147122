{% load static %}
<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Django CRM</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-main: #0f0f0f;
        --bg-card: #1a1a2e;
        --bg-surface: #16213e;
        --accent: #7effa0;
        --accent-hover: #5ce080;
        --text-primary: #e8e8e8;
        --text-secondary: rgba(255,255,255,0.55);
        --border-subtle: rgba(255,255,255,0.08);
      }

      body {
        background: var(--bg-main) !important;
        color: var(--text-primary);
        font-family: 'DM Mono', monospace;
        min-height: 100vh;
      }

      h1, h2, h3, h4, h5 {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      /* ─── Cards ───────────────────────── */
      .card-dark {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      }
      .card-dark .card-header {
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border-subtle);
        border-radius: 12px 12px 0 0;
        padding: 1.2rem 1.5rem;
      }
      .card-dark .card-body {
        padding: 1.5rem;
      }

      /* ─── Tables ──────────────────────── */
      .table-dark-custom {
        background: transparent;
        color: var(--text-primary);
        border-color: var(--border-subtle);
      }
      .table-dark-custom thead {
        background: var(--bg-surface);
      }
      .table-dark-custom thead th {
        font-family: 'DM Mono', monospace;
        font-size: 0.78rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        border-bottom: 2px solid var(--accent);
        padding: 0.9rem 0.75rem;
      }
      .table-dark-custom tbody tr {
        transition: background 0.2s;
        border-bottom: 1px solid var(--border-subtle);
      }
      .table-dark-custom tbody tr:hover {
        background: rgba(126,255,160,0.05);
      }
      .table-dark-custom td {
        padding: 0.85rem 0.75rem;
        vertical-align: middle;
        font-size: 0.88rem;
        color: var(--text-secondary);
        border: none;
      }

      /* ─── Buttons ─────────────────────── */
      .btn-accent {
        background: var(--accent);
        color: #0f0f0f;
        border: none;
        font-family: 'DM Mono', monospace;
        font-weight: 500;
        font-size: 0.82rem;
        letter-spacing: 0.04em;
        padding: 0.55rem 1.2rem;
        border-radius: 6px;
        transition: background 0.2s, transform 0.15s;
      }
      .btn-accent:hover {
        background: var(--accent-hover);
        color: #0f0f0f;
        transform: translateY(-1px);
      }

      .btn-outline-subtle {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid rgba(255,255,255,0.15);
        font-family: 'DM Mono', monospace;
        font-size: 0.82rem;
        padding: 0.55rem 1.2rem;
        border-radius: 6px;
        transition: all 0.2s;
      }
      .btn-outline-subtle:hover {
        color: #fff;
        border-color: rgba(255,255,255,0.4);
        background: rgba(255,255,255,0.05);
      }

      .btn-danger-custom {
        background: rgba(255,77,77,0.15);
        color: #ff6b6b;
        border: 1px solid rgba(255,77,77,0.25);
        font-family: 'DM Mono', monospace;
        font-size: 0.82rem;
        padding: 0.55rem 1.2rem;
        border-radius: 6px;
        transition: all 0.2s;
      }
      .btn-danger-custom:hover {
        background: rgba(255,77,77,0.25);
        color: #ff4d4d;
      }

      .btn-warning-custom {
        background: rgba(255,193,7,0.12);
        color: #ffc107;
        border: 1px solid rgba(255,193,7,0.25);
        font-family: 'DM Mono', monospace;
        font-size: 0.82rem;
        padding: 0.55rem 1.2rem;
        border-radius: 6px;
        transition: all 0.2s;
      }
      .btn-warning-custom:hover {
        background: rgba(255,193,7,0.22);
        color: #ffca2c;
      }

      /* ─── Forms ───────────────────────── */
      .form-control, .form-select {
        background: rgba(255,255,255,0.05) !important;
        border: 1px solid var(--border-subtle) !important;
        color: var(--text-primary) !important;
        border-radius: 8px;
        padding: 0.65rem 0.9rem;
        font-family: 'DM Mono', monospace;
        font-size: 0.88rem;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .form-control:focus, .form-select:focus {
        border-color: var(--accent) !important;
        box-shadow: 0 0 0 3px rgba(126,255,160,0.15) !important;
      }
      .form-control::placeholder {
        color: rgba(255,255,255,0.3) !important;
      }

      /* ─── Badges ──────────────────────── */
      .badge-active {
        background: rgba(126,255,160,0.15);
        color: var(--accent);
        padding: 0.35rem 0.75rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 500;
      }
      .badge-inactive {
        background: rgba(255,77,77,0.15);
        color: #ff6b6b;
        padding: 0.35rem 0.75rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 500;
      }

      /* ─── Link IDs ───────────────────── */
      .link-accent {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
        transition: opacity 0.2s;
      }
      .link-accent:hover {
        opacity: 0.75;
        color: var(--accent);
      }

      /* ─── Detail labels ──────────────── */
      .detail-label {
        color: var(--text-secondary);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 0.25rem;
      }
      .detail-value {
        color: var(--text-primary);
        font-size: 0.95rem;
        margin-bottom: 1rem;
      }

      /* ─── Toast Notifications ────────── */
      .toast-container-custom {
        position: fixed;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .toast-custom {
        min-width: 320px;
        border-radius: 10px;
        font-family: 'DM Mono', monospace;
        font-size: 0.85rem;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        border: 1px solid var(--border-subtle);
        backdrop-filter: blur(12px);
        animation: toastSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .toast-custom.toast-success {
        background: rgba(126,255,160,0.12);
        border-left: 4px solid var(--accent);
        color: var(--accent);
      }
      .toast-custom.toast-error {
        background: rgba(255,77,77,0.12);
        border-left: 4px solid #ff6b6b;
        color: #ff6b6b;
      }
      .toast-custom .toast-body {
        padding: 1rem 1.2rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .toast-custom .btn-close {
        filter: invert(1);
        opacity: 0.5;
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
      }
      .toast-custom .btn-close:hover {
        opacity: 1;
      }
      @keyframes toastSlideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes toastSlideOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(100%); opacity: 0; }
      }

      /* ─── SPA transitions ─────────────── */
      #spa-content {
        transition: opacity 0.25s ease;
      }
      #spa-content.spa-loading {
        opacity: 0.4;
      }
    </style>
  </head>
  <body>
    {% include 'navbar.html' %}

    <!-- Toast Notifications -->
    <div class="toast-container-custom" id="toast-container">
      {% if messages %}
        {% for message in messages %}
          <div class="toast-custom {% if message.tags == 'error' %}toast-error{% else %}toast-success{% endif %}" role="alert">
            <button type="button" class="btn-close" onclick="this.parentElement.style.animation='toastSlideOut 0.3s forwards'; setTimeout(()=>this.parentElement.remove(), 300)"></button>
            <div class="toast-body">
              {% if message.tags == 'error' %}⚠️{% else %}✅{% endif %}
              {{ message }}
            </div>
          </div>
        {% endfor %}
      {% endif %}
    </div>

    <div class="container">
      <br/>
      <div id="spa-content">
        {% block content %}
        {% endblock %}
      </div>
    </div>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

    <script>
      // ─── Auto-dismiss toasts ─────────────────────────
      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.toast-custom').forEach((toast, i) => {
          setTimeout(() => {
            toast.style.animation = 'toastSlideOut 0.3s forwards';
            setTimeout(() => toast.remove(), 300);
          }, 4000 + (i * 500));
        });
      });

      // ─── SPA Navigation ─────────────────────────────
      function spaNavigate(url, pushState = true) {
        const content = document.getElementById('spa-content');
        content.classList.add('spa-loading');

        fetch(url, {
          headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(res => res.text())
        .then(html => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          const newContent = doc.getElementById('spa-content');
          const newToasts = doc.getElementById('toast-container');

          if (newContent) {
            content.innerHTML = newContent.innerHTML;
          }

          // Inject new toasts if any
          if (newToasts && newToasts.children.length > 0) {
            const container = document.getElementById('toast-container');
            container.innerHTML = newToasts.innerHTML;
            // Auto-dismiss new toasts
            container.querySelectorAll('.toast-custom').forEach((toast, i) => {
              // Re-attach close button handler
              const closeBtn = toast.querySelector('.btn-close');
              if (closeBtn) {
                closeBtn.onclick = function() {
                  toast.style.animation = 'toastSlideOut 0.3s forwards';
                  setTimeout(() => toast.remove(), 300);
                };
              }
              setTimeout(() => {
                toast.style.animation = 'toastSlideOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
              }, 4000 + (i * 500));
            });
          }

          // Update navbar if it changed (e.g. after login/logout)
          const newNav = doc.querySelector('.navbar');
          const oldNav = document.querySelector('.navbar');
          if (newNav && oldNav) {
            oldNav.innerHTML = newNav.innerHTML;
            attachSpaListeners();
          }

          if (pushState) {
            history.pushState({}, '', url);
          }

          content.classList.remove('spa-loading');

          // Re-attach SPA listeners on new content
          attachSpaListeners();
        })
        .catch(() => {
          // Fallback to normal navigation on error
          window.location.href = url;
        });
      }

      function attachSpaListeners() {
        document.querySelectorAll('[data-spa]').forEach(link => {
          link.removeEventListener('click', spaClickHandler);
          link.addEventListener('click', spaClickHandler);
        });
      }

      function spaClickHandler(e) {
        e.preventDefault();
        const url = this.getAttribute('href');
        if (url && url !== '#') {
          spaNavigate(url);
        }
      }

      // Handle forms within SPA
      function attachSpaForms() {
        // Forms are handled normally (POST requires full reload for CSRF + redirects)
      }

      // Handle browser back/forward
      window.addEventListener('popstate', () => {
        spaNavigate(window.location.pathname, false);
      });

      // Initial attachment
      document.addEventListener('DOMContentLoaded', attachSpaListeners);
    </script>
  </body>
</html>
