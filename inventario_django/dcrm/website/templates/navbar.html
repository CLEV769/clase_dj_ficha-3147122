<nav
  class="navbar navbar-expand-lg"
  style="
    background: #0f0f0f;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    padding: 0 1.5rem;
    font-family: 'DM Mono', monospace;
  "
>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap");

    .navbar-custom .navbar-brand {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      color: #fff !important;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: opacity 0.2s;
    }

    .navbar-custom .navbar-brand::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #7effa0;
      border-radius: 50%;
      box-shadow: 0 0 8px #7effa099;
    }

    .navbar-custom .navbar-brand:hover {
      opacity: 0.75;
    }

    .navbar-custom .nav-link {
      font-family: "DM Mono", monospace;
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.45) !important;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 1.6rem 1rem !important;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .navbar-custom .nav-link:hover {
      color: #fff !important;
      border-bottom-color: #7effa0;
    }

    .navbar-custom .navbar-toggler {
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      padding: 6px 10px;
    }

    .navbar-custom .navbar-toggler:focus {
      box-shadow: 0 0 0 2px #7effa044;
    }
  </style>

  <div class="container-fluid navbar-custom">
    <a class="navbar-brand" href="{% url 'home' %}">Django CMR</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        {% if user.is_authenticated %}
        <li class="nav-item">
          <a class="nav-link" href="{% url 'logout' %}">🔒 Cerrar sesion</a>
        </li>
        {% else %}
        <li class="nav-item">
          <a class="nav-link" href="{% url 'home' %}">Inicio de sesion</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'register' %}">📔 Registrar</a>
        </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
